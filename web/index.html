<!DOCTYPE html>
<html>

<head>
    <title>Tronche</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4ecdf;
            --surface-color: #e6daca;
            --primary-color: #8b5a2b;
            --text-color: #3e2723;
            --text-muted: #795548;
            --border-color: #d7ccc8;

            /* Light Theme Palette */
            --brush-1: #8b5a2b;
            --brush-2: #3e2723;
            --brush-3: #c08035;
            --brush-4: #5d4037;
            --brush-5: #a1887f;
            --brush-6: #388e3c;
            --brush-7: #d32f2f;
            --brush-8: #1976d2;

            /* SVG icon filter — converts black SVG paths to the primary sepia brown (#8b5a2b) */
            --icon-filter: invert(33%) sepia(30%) saturate(789%) hue-rotate(348deg) brightness(82%) contrast(83%);
            /* Danger icon filter — warm red for erase-all */
            --icon-filter-danger: invert(27%) sepia(60%) saturate(900%) hue-rotate(340deg) brightness(85%) contrast(100%);
        }

        [data-theme="dark"] {
            --bg-color: #2e241f;
            --surface-color: #40322a;
            --primary-color: #d99a5a;
            --text-color: #f4ecdf;
            --text-muted: #a68a76;
            --border-color: #5c483a;

            /* Dark Theme Palette */
            --brush-1: #d99a5a;
            --brush-2: #f4ecdf;
            --brush-3: #ffb74d;
            --brush-4: #a1887f;
            --brush-5: #8d6e63;
            --brush-6: #81c784;
            --brush-7: #e57373;
            --brush-8: #64b5f6;

            /* SVG icon filter — converts black paths to the golden sepia (#d99a5a) */
            --icon-filter: invert(67%) sepia(38%) saturate(571%) hue-rotate(342deg) brightness(107%) contrast(87%);
            /* Danger icon filter — muted warm red in dark */
            --icon-filter-danger: invert(55%) sepia(30%) saturate(700%) hue-rotate(330deg) brightness(115%) contrast(90%);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Margarine', system-ui;
            display: flex;
            height: 100vh;
        }

        /* ── Sidebar ─────────────────────────────────── */
        #sidebar {
            position: relative;
            width: 300px;
            flex-shrink: 0;
            background: var(--surface-color);
            display: flex;
            flex-direction: column;
            padding: 22px 20px;
            box-shadow: 2px 0 24px rgba(0, 0, 0, 0.18);
            z-index: 1000;
            /* overflow visible so the torn paper edge can bleed into the canvas */
            overflow: visible;
            box-sizing: border-box;
        }

        /* ── Logo ────────────────────────────────────── */
        .logo-area {
            margin-bottom: 26px;
        }

        .logo-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            flex-shrink: 0;
            filter: var(--icon-filter);
            transition: filter 0.3s;
        }

        h1 {
            font-weight: 600;
            font-size: 26px;
            margin: 0;
            color: var(--primary-color);
            letter-spacing: -0.01em;
        }

        .tagline {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.45;
            opacity: 0.85;
        }

        /* ── Controls ────────────────────────────────── */
        .control-group {
            margin-bottom: 18px;
        }

        /* ── Settings button ──────────────────────────── */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.07);
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 100;
            padding: 0;
        }

        .settings-btn img {
            width: 17px;
            height: 17px;
            filter: var(--icon-filter);
            transition: transform 0.3s ease, filter 0.3s;
        }

        .settings-btn:hover {
            background: rgba(0, 0, 0, 0.12);
        }

        .settings-btn:hover img {
            transform: rotate(22deg);
        }

        .settings-popup {
            position: absolute;
            top: 60px;
            right: 20px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.22);
            width: 188px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: opacity 0.18s ease, transform 0.18s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .settings-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .settings-popup hr {
            border: none;
            border-top: 1px solid var(--border-color);
            margin: 10px 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* ── Color palette ───────────────────────────── */
        .palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 7px;
            margin-bottom: 18px;
        }

        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.2s;
        }

        .color-swatch:hover  { transform: scale(1.12); }
        .color-swatch.active { border-color: var(--text-color); transform: scale(1.12); }

        .color-1 { background-color: var(--brush-1); }
        .color-2 { background-color: var(--brush-2); }
        .color-3 { background-color: var(--brush-3); }
        .color-4 { background-color: var(--brush-4); }
        .color-5 { background-color: var(--brush-5); }
        .color-6 { background-color: var(--brush-6); }
        .color-7 { background-color: var(--brush-7); }
        .color-8 { background-color: var(--brush-8); }

        /* ── Tool buttons ────────────────────────────── */
        .tool-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            background: rgba(0, 0, 0, 0.06);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            box-sizing: border-box;
            transition: background 0.18s, border-color 0.18s;
            margin-bottom: 18px;
        }

        .tool-btn img {
            width: 16px;
            height: 16px;
            filter: var(--icon-filter);
            flex-shrink: 0;
            transition: filter 0.3s;
        }

        .tool-btn.active {
            background: rgba(139, 90, 43, 0.11);
            border-color: var(--primary-color);
        }

        .tool-btn:hover { background: rgba(0, 0, 0, 0.1); }

        .action-row {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .action-row .tool-btn {
            margin-bottom: 0;
            flex: 1;
            padding: 8px 8px;
        }

        /* Danger variant — erase all */
        .btn-danger {
            border-color: rgba(200, 70, 50, 0.3);
        }

        .btn-danger img {
            filter: var(--icon-filter-danger) !important;
        }

        .btn-danger:hover {
            background: rgba(200, 70, 50, 0.08) !important;
            border-color: rgba(200, 70, 50, 0.5);
        }

        /* ── Toggle switch ───────────────────────────── */
        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .toggle-row:first-child { margin-top: 0; }

        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 22px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--border-color);
            transition: .3s;
            border-radius: 22px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary-color); }
        input:checked + .slider:before { transform: translateX(16px); }

        /* ── Results area ────────────────────────────── */
        #results-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 180px;
            position: relative;
        }

        #main-guess {
            font-size: 76px;
            line-height: 1;
            margin-bottom: 14px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #main-guess.pulse { transform: scale(1.2); }

        /* ── Feedback ────────────────────────────────── */
        #feedback-area {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #feedback-area.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn {
            padding: 7px 14px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.18s;
            font-size: 14px;
        }

        .btn-correct {
            background: rgba(46, 204, 113, 0.14);
            color: #2ecc71;
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .btn-wrong {
            background: rgba(231, 76, 60, 0.14);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* ── Correction UI ───────────────────────────── */
        #correction-ui {
            display: none;
            margin-top: 10px;
            width: 100%;
        }

        .correction-emoji-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 7px;
        }

        .correction-emoji-btn {
            font-size: 28px;
            line-height: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .correction-emoji-btn:hover {
            background: rgba(0, 0, 0, 0.13);
            transform: scale(1.12);
        }

        /* ── Session stats ───────────────────────────── */
        #session-stats {
            margin-top: auto;
            border-top: 1px solid var(--border-color);
            padding-top: 14px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .stat-value-highlight {
            color: var(--primary-color);
            font-weight: 600;
        }

        #advanced-stats {
            width: 100%;
            display: none;
            margin-top: 18px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 7px;
            font-size: 15px;
        }

        .stat-label {
            width: 22px;
            text-align: center;
            margin-right: 8px;
        }

        .stat-bar-bg {
            flex-grow: 1;
            height: 5px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .stat-bar-fill {
            height: 100%;
            background: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease-out;
        }

        .stat-value {
            width: 38px;
            text-align: right;
            font-feature-settings: "tnum";
            color: var(--text-muted);
            font-size: 12px;
        }

        /* ── Canvas area ─────────────────────────────── */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            background: radial-gradient(circle at center, var(--surface-color) 0%, var(--bg-color) 100%);
            cursor: crosshair;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #status {
            position: absolute;
            bottom: 18px;
            left: 20px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.6;
            pointer-events: none;
            letter-spacing: 0.03em;
        }

        /* ── Mobile ──────────────────────────────────── */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }

            #sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                justify-content: space-between;
                padding: 10px 12px;
                box-sizing: border-box;
                display: flex;
                flex-wrap: wrap;
                overflow: visible;
            }

            .logo-area, .control-group { margin: 0; }

            h1 { font-size: 18px; }

            .tagline, .toggle-row label { display: none; }

            #results-area {
                min-height: auto;
                flex-direction: row;
                gap: 14px;
                order: 2;
                width: 100%;
                justify-content: space-between;
                align-items: center;
            }

            #feedback-area { margin-top: 0; }

            #main-guess { font-size: 38px; margin: 0; }

            #advanced-stats { display: none !important; }

            #correction-ui {
                position: absolute;
                bottom: 100%;
                left: 0;
                right: 0;
                background: var(--surface-color);
                padding: 10px;
                border-radius: 8px 8px 0 0;
            }
        }
    </style>
</head>

<body>

    <div id="sidebar">


        <!-- Logo + title -->
        <div class="logo-area">
            <div class="logo-header">
                <img src="icons/tronche_logo.svg" class="logo-icon" alt="Tronche logo">
                <h1>Tronche</h1>
            </div>
            <div class="tagline">Technical Recognition of Optical Networks for Complex Handrawn Emojis</div>
        </div>

        <!-- Controls -->
        <div class="control-group">
            <label>Color</label>
            <div class="palette" id="palette">
                <div class="color-swatch color-1 active" data-color="var(--brush-1)"></div>
                <div class="color-swatch color-2" data-color="var(--brush-2)"></div>
                <div class="color-swatch color-3" data-color="var(--brush-3)"></div>
                <div class="color-swatch color-4" data-color="var(--brush-4)"></div>
                <div class="color-swatch color-5" data-color="var(--brush-5)"></div>
                <div class="color-swatch color-6" data-color="var(--brush-6)"></div>
                <div class="color-swatch color-7" data-color="var(--brush-7)"></div>
                <div class="color-swatch color-8" data-color="var(--brush-8)"></div>
            </div>

            <div class="action-row">
                <button class="tool-btn" id="eraserBtn">
                    <img src="icons/tronche_erase.svg" alt="">
                    <span>Eraser</span>
                </button>
                <button class="tool-btn btn-danger" id="eraseAllBtn" onclick="clearCanvas()">
                    <img src="icons/tronche_eraseall.svg" alt="">
                    <span>Erase All</span>
                </button>
            </div>
        </div>

        <!-- Settings button -->
        <button class="settings-btn" id="settingsBtn" title="Settings">
            <img src="icons/tronche_settings.svg" alt="Settings">
        </button>

        <!-- Settings popup -->
        <div class="settings-popup" id="settingsPopup">
            <div class="toggle-row">
                <label for="themeToggle" style="margin:0; cursor:pointer;">Dark Mode</label>
                <label class="switch">
                    <input type="checkbox" id="themeToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <hr>

            <div class="toggle-row">
                <label for="advancedToggle" style="margin:0; cursor:pointer;">Advanced Mode</label>
                <label class="switch">
                    <input type="checkbox" id="advancedToggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Results / guess display -->
        <div id="results-area">
            <div id="main-guess">🙂</div>

            <div id="feedback-area">
                <button class="btn btn-correct" onclick="submitFeedback(true)">✅ Correct</button>
                <button class="btn btn-wrong" onclick="showCorrection()">❌ Wrong</button>
            </div>

            <div id="correction-ui">
                <label>What was it?</label>
                <div class="correction-emoji-row" id="correction-emoji-row"></div>
                <button class="tool-btn" onclick="cancelCorrection()">Cancel</button>
            </div>

            <div id="advanced-stats"></div>
        </div>

        <div id="session-stats">
            Session Accuracy: <span id="accuracy-stat" class="stat-value-highlight">0%</span>
            (<span id="correct-count">0</span>/<span id="total-count">0</span>)
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="status">Connecting...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');
        const mainGuess = document.getElementById('main-guess');
        const advancedStats = document.getElementById('advanced-stats');
        const advancedToggle = document.getElementById('advancedToggle');
        const themeToggle = document.getElementById('themeToggle');
        const settingsBtn = document.getElementById('settingsBtn');
        const settingsPopup = document.getElementById('settingsPopup');
        const palette = document.getElementById('palette');
        const swatches = document.querySelectorAll('.color-swatch');
        const eraserBtn = document.getElementById('eraserBtn');
        const container = document.getElementById('canvas-container');
        const feedbackArea = document.getElementById('feedback-area');
        const correctionUi = document.getElementById('correction-ui');
        const correctionEmojiRow = document.getElementById('correction-emoji-row');

        let lastProbabilities = {};

        // Stats elements
        const accuracyStat = document.getElementById('accuracy-stat');
        const correctCount = document.getElementById('correct-count');
        const totalCount = document.getElementById('total-count');

        // Drawing state
        let currentStrokes = []; // Store strokes as arrays of points {x, y, time}
        let renderHistory = []; // Extended stroke info for rendering
        let currentStroke = [];

        // Config
        let showAdvanced = false;
        let isEraser = false;
        let currentBrushVar = 'var(--brush-1)'; // Store the variable, not static hex directly

        // Helper to get computed CSS vars for canvas stroke
        function getBrushColor() {
            if (isEraser) return null; // We'll handle erasing in resize/draw
            return getComputedStyle(document.documentElement).getPropertyValue(currentBrushVar.slice(4, -1)).trim();
        }

        // Resize canvas
        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = 5;
            // set style based on tool state
            if (!isEraser) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = getBrushColor();
            } else {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = 20; // Thicker eraser
            }
            redrawCanvas();
        }

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const stroke of renderHistory) {
                if (stroke.points.length === 0) continue;

                if (stroke.isEraser) {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.strokeStyle = 'rgba(0,0,0,1)';
                    ctx.lineWidth = 20;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue(stroke.colorVar.slice(4, -1)).trim();
                    ctx.lineWidth = 5;
                }

                ctx.beginPath();
                ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
                for (let i = 1; i < stroke.points.length; i++) {
                    ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
                }
                ctx.stroke();
            }

            // Restore current tool
            if (!isEraser) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = getBrushColor() || 'rgba(0,0,0,1)';
                ctx.lineWidth = 5;
            } else {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = 20;
            }
        }

        window.addEventListener('resize', resize);
        resize(); // Initial sizing

        advancedToggle.addEventListener('change', (e) => {
            showAdvanced = e.target.checked;
            advancedStats.style.display = showAdvanced ? 'block' : 'none';
        });

        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
        }

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            }
            // Update canvas stroke when theme changes
            if (!isEraser) ctx.strokeStyle = getBrushColor();
            redrawCanvas();
        });

        // Settings Popup
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPopup.classList.toggle('show');
        });

        document.addEventListener('click', (e) => {
            if (!settingsPopup.contains(e.target) && !settingsBtn.contains(e.target)) {
                settingsPopup.classList.remove('show');
            }
        });

        settingsPopup.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // Tool Selection
        swatches.forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                // Update active state
                swatches.forEach(s => s.classList.remove('active'));
                eraserBtn.classList.remove('active');
                e.target.classList.add('active');

                // Update settings
                isEraser = false;
                currentBrushVar = e.target.getAttribute('data-color');

                // Update canvas context
                ctx.globalCompositeOperation = 'source-over';
                ctx.lineWidth = 5;
                ctx.strokeStyle = getBrushColor();
            });
        });

        eraserBtn.addEventListener('click', () => {
            // Update active state
            swatches.forEach(s => s.classList.remove('active'));
            eraserBtn.classList.add('active');

            // Update settings
            isEraser = true;

            // Update canvas context
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 20;
        });

        // WebSocket
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const socket = new WebSocket(`${wsProtocol}//${window.location.host}/ws/draw`);

        socket.onopen = () => status.innerText = "● System Online";
        socket.onclose = () => status.innerText = "○ System Offline";

        socket.onmessage = (e) => {
            const data = JSON.parse(e.data);

            // Handle Stats Update
            if (data.type === "stats") {
                updateSessionStats(data.data);
                return;
            }

            // Handle Guess
            if (data.type === "guess") {
                mainGuess.innerText = data.guess;
                mainGuess.classList.remove('pulse');
                void mainGuess.offsetWidth;
                mainGuess.classList.add('pulse');

                // Show feedback buttons if we have drawn something
                if (currentStrokes.length > 0) {
                    feedbackArea.classList.add('visible');
                }

                lastProbabilities = data.probabilities || {};

                if (showAdvanced) {
                    renderStats(data.probabilities);
                }
            }
        };

        function updateSessionStats(stats) {
            const total = stats.total;
            const correct = stats.correct;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

            accuracyStat.innerText = `${accuracy}%`;
            correctCount.innerText = correct;
            totalCount.innerText = total;
        }

        function renderStats(probs) {
            advancedStats.innerHTML = '';
            const entries = Object.entries(probs).slice(0, 5);

            entries.forEach(([emoji, prob]) => {
                const percentage = Math.round(prob * 100);
                const row = document.createElement('div');
                row.className = 'stat-row';
                row.innerHTML = `
                    <div class="stat-label">${emoji}</div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="stat-value">${percentage}%</div>
                `;
                advancedStats.appendChild(row);
            });
        }

        // Feedback Logic
        function submitFeedback(isCorrect) {
            const label = isCorrect ? mainGuess.innerText : null;
            if (isCorrect) {
                sendFeedback(true, label);
            }
        }

        function showCorrection() {
            feedbackArea.style.display = 'none';

            // Build top-5 emoji buttons from last probabilities
            correctionEmojiRow.innerHTML = '';
            const top5 = Object.entries(lastProbabilities)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);
            top5.forEach(([emoji]) => {
                const btn = document.createElement('button');
                btn.className = 'correction-emoji-btn';
                btn.textContent = emoji;
                btn.onclick = () => sendFeedback(false, emoji);
                correctionEmojiRow.appendChild(btn);
            });

            correctionUi.style.display = 'block';
        }

        function cancelCorrection() {
            correctionUi.style.display = 'none';
            feedbackArea.style.display = 'flex';
        }

        function sendFeedback(correct, label) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    type: "feedback",
                    correct: correct,
                    label: label,
                    vectors: currentStrokes
                }));
            }

            // Reset UI
            feedbackArea.classList.remove('visible');
            feedbackArea.style.display = 'flex';
            correctionUi.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentStrokes = [];
            renderHistory = [];
            currentStroke = [];
            mainGuess.innerText = "🙂"; // Reset placeholder

            // Re-render empty stats if advanced is open (optional)
            if (showAdvanced) advancedStats.innerHTML = '';
        }

        // Action Buttons
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentStrokes = [];
            renderHistory = [];
            currentStroke = [];
            feedbackArea.classList.remove('visible');
        }

        // Drawing Logic
        let drawing = false;

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        function startDraw(e) {
            if (e.button !== 0 && !e.touches) return;
            drawing = true;
            const { x, y } = getPos(e);

            currentStroke = [{ x: Math.round(x), y: Math.round(y), t: Date.now() }];
            currentStrokes.push(currentStroke);
            renderHistory.push({
                points: currentStroke,
                colorVar: isEraser ? null : currentBrushVar,
                isEraser: isEraser
            });

            ctx.beginPath();
            ctx.moveTo(x, y);

            // Hide feedback buttons when starting a new drawing
            feedbackArea.classList.remove('visible');
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const { x, y } = getPos(e);

            // Record point
            currentStroke.push({ x: Math.round(x), y: Math.round(y), t: Date.now() });

            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function endDraw() {
            if (!drawing) return;
            drawing = false;

            if (currentStrokes.length === 0 || socket.readyState !== WebSocket.OPEN) return;

            // Compute bounding box of all non-eraser strokes
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const stroke of renderHistory) {
                if (stroke.isEraser) continue;
                for (const pt of stroke.points) {
                    minX = Math.min(minX, pt.x);
                    minY = Math.min(minY, pt.y);
                    maxX = Math.max(maxX, pt.x);
                    maxY = Math.max(maxY, pt.y);
                }
            }
            if (minX === Infinity) return;

            // Add padding, then make square (centered)
            const PAD = 20;
            minX = Math.max(0, minX - PAD);
            minY = Math.max(0, minY - PAD);
            maxX = Math.min(canvas.width - 1, maxX + PAD);
            maxY = Math.min(canvas.height - 1, maxY + PAD);
            const rawW = maxX - minX;
            const rawH = maxY - minY;
            const rawSize = Math.max(rawW, rawH);
            const offX = (rawSize - rawW) / 2;  // centering offset
            const offY = (rawSize - rawH) / 2;

            // Render directly at 32x32 — matches training data exactly
            const MODEL_SIZE = 32;
            const scale = MODEL_SIZE / rawSize;

            const out = document.createElement('canvas');
            out.width = MODEL_SIZE;
            out.height = MODEL_SIZE;
            const outCtx = out.getContext('2d');
            outCtx.fillStyle = 'white';
            outCtx.fillRect(0, 0, MODEL_SIZE, MODEL_SIZE);
            outCtx.strokeStyle = 'black';
            outCtx.lineWidth = 2.5;  // matches pen-on-paper stroke at 32x32
            outCtx.lineCap = 'round';
            outCtx.lineJoin = 'round';

            for (const stroke of renderHistory) {
                if (stroke.isEraser || stroke.points.length === 0) continue;
                outCtx.beginPath();
                outCtx.moveTo((stroke.points[0].x - minX + offX) * scale,
                              (stroke.points[0].y - minY + offY) * scale);
                for (let i = 1; i < stroke.points.length; i++) {
                    outCtx.lineTo((stroke.points[i].x - minX + offX) * scale,
                                  (stroke.points[i].y - minY + offY) * scale);
                }
                outCtx.stroke();
            }

            const imageData = out.toDataURL('image/png').split(',')[1];
            socket.send(JSON.stringify({ type: 'image', data: imageData }));
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', endDraw);

        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        window.addEventListener('touchend', endDraw);

    </script>
</body>

</html>
